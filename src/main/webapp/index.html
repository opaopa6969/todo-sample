<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Todo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2em auto; padding: 0 1em; }
  header { display: flex; gap: .5em; align-items: center; margin-bottom: 1em; }
  input[type=text] { flex: 1; padding: .4em; }
  ul { list-style: none; padding: 0; }
  li { display: flex; gap: .5em; align-items: center; padding: .3em 0; border-bottom: 1px solid #eee; }
  li.done span { text-decoration: line-through; color: #888; }
  li span { flex: 1; }
  button { cursor: pointer; }
  .who { color: #666; font-size: .9em; }
</style>
</head>
<body>
<h1>Todo</h1>
<header>
  <label>user: <input id="user" type="text" placeholder="名前" style="width:8em"></label>
  <span class="who" id="who"></span>
</header>
<form id="add">
  <div style="display:flex; gap:.5em;">
    <input id="title" type="text" placeholder="やること" required>
    <button type="submit">追加</button>
  </div>
</form>
<ul id="list"></ul>

<script>
const $ = (id) => document.getElementById(id);
const userInput = $('user');
const who = $('who');
const list = $('list');

userInput.value = localStorage.getItem('user') || '';
userInput.addEventListener('input', () => {
  localStorage.setItem('user', userInput.value);
  refresh();
});

function user() { return userInput.value.trim(); }

async function api(method, path, body) {
  const u = user();
  if (!u) return null;
  const res = await fetch(path, {
    method,
    headers: { 'X-User': u, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function refresh() {
  list.innerHTML = '';
  const u = user();
  who.textContent = u ? `as "${u}"` : '(ユーザ名を入力)';
  if (!u) return;
  const items = await api('GET', '/todos');
  for (const t of items) list.appendChild(render(t));
}

function render(t) {
  const li = document.createElement('li');
  if (t.done) li.classList.add('done');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = t.done;
  cb.onchange = async () => {
    await api('PUT', `/todos/${t.id}`, { done: cb.checked });
    refresh();
  };
  const span = document.createElement('span');
  span.textContent = t.title;
  const del = document.createElement('button');
  del.textContent = '×';
  del.onclick = async () => {
    await api('DELETE', `/todos/${t.id}`);
    refresh();
  };
  li.append(cb, span, del);
  return li;
}

$('add').addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = $('title').value.trim();
  if (!title || !user()) return;
  await api('POST', '/todos', { title });
  $('title').value = '';
  refresh();
});

refresh();
</script>
</body>
</html>
